name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-fast:
    name: Backend (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-fast-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-fast-${{ runner.os }}-

      - name: Install dependencies (without ML)
        run: poetry install --without ml

      - name: Lint (ruff)
        run: |
          poetry run ruff check src/ tests/
          poetry run ruff format --check src/ tests/

      - name: Smoke test CLI
        run: poetry run python -m src.cli --help

      - name: Run tests (non-ML)
        run: |
          poetry run pytest \
            --ignore=tests/test_index_manager.py \
            --ignore=tests/test_search_engine.py \
            --ignore=tests/test_query_expander.py \
            --ignore=tests/test_company_centroids.py \
            --ignore=tests/test_market_intelligence.py \
            -x -q

  backend-runtime:
    name: Backend (ONNX runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-runtime-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-runtime-${{ runner.os }}-

      - name: Install ONNX/runtime dependencies
        run: poetry install --with ml

      - name: Run runtime tests
        run: |
          poetry run pytest \
            tests/test_benchmark_script.py \
            tests/test_cli_embedding_defaults.py \
            tests/test_index_manager.py \
            tests/test_search_engine.py \
            tests/test_query_expander.py \
            tests/test_company_centroids.py \
            tests/test_market_intelligence.py \
            -x -q

  docker-onnx-smoke:
    name: Docker (ONNX smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Docker ONNX smoke test
        run: bash scripts/run_docker_onnx_smoke.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: src/frontend/.nvmrc
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build
        run: npx vite build
